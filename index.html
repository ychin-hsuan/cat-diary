<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>歡迎來到我的專案</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&family=Noto+Sans+TC:wght@400;500;700&display=swap"
      rel="stylesheet"
    />

    <style>
      :root {
        --bg-color: #f8fafc;
        --card-bg: #ffffff;
        --primary-color: #4f46e5;
        --primary-hover: #4338ca;
        --text-main: #1e293b;
        --text-muted: #64748b;
        --border-color: #e2e8f0;
      }

      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        font-family: "Plus Jakarta Sans", "Noto Sans TC", sans-serif;
        background-color: var(--bg-color);
        color: var(--text-main);
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        padding: 20px;
      }

      .container {
        max-width: 600px;
        width: 100%;
        background: var(--card-bg);
        padding: 40px 30px;
        border-radius: 24px;
        box-shadow:
          0 10px 25px -5px rgba(0, 0, 0, 0.05),
          0 8px 10px -6px rgba(0, 0, 0, 0.05);
        border: 1px solid var(--border-color);
        text-align: center;
        transition: transform 0.3s ease;
      }

      .container:hover {
        transform: translateY(-2px);
      }

      .logo-placeholder {
        width: 80px;
        height: 80px;
        background: linear-gradient(135deg, #6366f1, #4f46e5);
        color: white;
        border-radius: 20px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 32px;
        font-weight: 700;
        margin: 0 auto 24px;
        box-shadow: 0 10px 15px -3px rgba(79, 70, 229, 0.3);
      }

      h1 {
        font-size: 28px;
        font-weight: 700;
        color: var(--text-main);
        margin-bottom: 12px;
        letter-spacing: -0.5px;
      }

      p {
        font-size: 16px;
        color: var(--text-muted);
        line-height: 1.6;
        margin-bottom: 32px;
      }

      .btn {
        display: inline-block;
        background-color: var(--primary-color);
        color: white;
        padding: 14px 32px;
        border-radius: 12px;
        font-size: 16px;
        font-weight: 600;
        text-decoration: none;
        transition: all 0.2s ease;
        box-shadow: 0 4px 6px -1px rgba(79, 70, 229, 0.2);
      }

      .btn:hover {
        background-color: var(--primary-hover);
        transform: translateY(-1px);
        box-shadow: 0 10px 15px -3px rgba(79, 70, 229, 0.3);
      }

      .btn:active {
        transform: translateY(1px);
      }

      footer {
        margin-top: 40px;
        font-size: 14px;
        color: var(--text-muted);
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="logo-placeholder">🚀</div>

      <h1>新專案已成功建立！</h1>

      <p>
        這是一個乾淨且具備現代設計感首頁起手式。現在你可以開始編輯程式碼，加入你的創意與功能，打造出屬於你的獨特應用程式。
      </p>

      <a href="#" class="btn" onclick="startProject(event)">開始探索</a>
    </div>

    <footer>&copy; 2026 我的專案空間. All rights reserved.</footer>

    <script>
      // 簡單的點擊互動示意
      function startProject(event) {
        event.preventDefault();
        alert("準備好開始了嗎？快去修改 index.html 吧！");
      }
    </script>
  </body>
</html>
